apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: learn2code-api
  namespace: learn2code
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: learn2code-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50