namespace: learn2code
replicaCount: 2

image:
  repository: learn2code-api
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: learn2code.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Development"
  Python__Path: "python"
  Python__SandboxDir: "/app/sandbox"
  Database__SkipSeed: "false"

probes:
  readiness:
    path: /swagger/v1/swagger.json
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /swagger/v1/swagger.json
    initialDelaySeconds: 20
    periodSeconds: 20

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClassName: hostpath
  size: 1Gi
  mountPath: /app/data

pdb:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  automountToken: false

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels:
    release: prometheus